name: Telegram Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Telegram Mesaj Gönder
        shell: powershell
        run: |
          $uri  = "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
          $body = "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=Sistem+testi+basarili"
          $response = Invoke-RestMethod -Uri $uri -Method Post -Body $body
          Write-Host ($response | ConvertTo-Json)
