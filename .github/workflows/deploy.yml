name: Deploy Odoo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        shell: powershell
        run: .\deploy.ps1

      - name: Telegram Bildirimi
        if: always()
        continue-on-error: true
        shell: powershell
        run: |
          $commitMsg = git log -1 --pretty=format:"%s"
          $author    = git log -1 --pretty=format:"%an"
          $sha       = git rev-parse --short HEAD
          $status    = "${{ job.status }}"
          $icon      = if ($status -eq "success") { "✅" } else { "❌" }
          $text      = "$icon Odoo Deploy $status`nRepo: berk420/erp-test`nCommit: $sha - $commitMsg`nYazar: $author"
          $uri       = "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
          $body      = "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=" + [Uri]::EscapeDataString($text)
          Invoke-RestMethod -Uri $uri -Method Post -Body $body
