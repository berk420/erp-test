name: Deploy Odoo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        shell: pwsh
        run: .\deploy.ps1

      - name: Telegram Bildirimi
        if: always()
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          $commitMsg = git log -1 --pretty=format:"%s"
          $author    = git log -1 --pretty=format:"%an"
          $sha       = git rev-parse --short HEAD
          $icon      = if ($env:JOB_STATUS -eq "success") { "✅" } else { "❌" }
          $text      = "$icon Odoo Deploy $($env:JOB_STATUS)`nRepo: berk420/erp-test`nCommit: $sha - $commitMsg`nYazar: $author"
          $body      = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $text }
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" `
            -Method Post -ContentType "application/json" -Body ($body | ConvertTo-Json)
